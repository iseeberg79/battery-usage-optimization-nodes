name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Run tests
      run: npm test

    - name: Build package
      run: npm run grunt

    - name: Generate JSDoc
      run: npx jsdoc -c jsdoc.json

    - name: Check version matches release tag
      run: |
        PACKAGE_VERSION=$(node -p "require('./package.json').version")
        RELEASE_TAG=${GITHUB_REF#refs/tags/}
        echo "Package version: $PACKAGE_VERSION"
        echo "Release tag: $RELEASE_TAG"
        if [ "$PACKAGE_VERSION" != "$RELEASE_TAG" ]; then
          echo "❌ Version mismatch: package.json ($PACKAGE_VERSION) != release tag ($RELEASE_TAG)"
          exit 1
        fi
        echo "✅ Version matches release tag"

    # Trusted Publishing (OIDC) needs npm >= 11.5.1; node 20 ships npm 10.
    - name: Upgrade npm for trusted publishing
      run: npm install -g npm@latest

    # No NODE_AUTH_TOKEN: authenticates via OIDC against the trusted
    # publisher configured for this package on npmjs.com. Provenance is
    # generated automatically.
    - name: Publish to npm
      run: npm publish

    - name: Create package artifact
      run: npm pack

    - name: Upload release artifact
      uses: actions/upload-artifact@v4
      with:
        name: npm-package
        path: '*.tgz'
